<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarDesigns Facebook</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f0f2f5;
}

header{
    background:#1877f2;
    color:white;
    padding:15px;
    text-align:center;
}

.post{
    background:white;
    width:300px;
    margin:30px auto;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.post img{
    width:100%;
    border-radius:10px;
}

button{
    background:#1877f2;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
    <h1>Facebook StarDesigns</h1>
</header>

<div class="post">
    <h3>Polera Anime Premium</h3>
    <img src="anime.jpeg">
    <p>Nuevo diseño exclusivo disponible.</p>
    <button>Me gusta</button>
</div>

</body>
</html>
