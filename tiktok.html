<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarDesigns TikTok</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

.video{
    width:300px;
    height:500px;
    background:#111;
    margin:20px auto;
    border-radius:20px;
    overflow:hidden;
    position:relative;
}

.video img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.info{
    position:absolute;
    bottom:20px;
    left:10px;
    text-align:left;
}
</style>
</head>

<body>

<h1>TikTok StarDesigns</h1>

<div class="video">

    <img src="anime.jpeg">

    <div class="info">
        <h3>@StarDesigns</h3>
        <p>Nuevo diseño anime 🔥</p>
    </div>

</div>

</body>
</html>
