<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarDesigns Instagram</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fafafa;
}

header{
    background:linear-gradient(45deg,#ff0080,#ff8c00);
    color:white;
    text-align:center;
    padding:20px;
}

.card{
    width:320px;
    background:white;
    margin:30px auto;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
}

.info{
    padding:15px;
}

.icons{
    font-size:25px;
}
</style>
</head>

<body>

<header>
    <h1>Instagram StarDesigns</h1>
</header>

<div class="card">

    <img src="anime.jpeg">

    <div class="info">
        <div class="icons">
            ❤️ 💬 📤
        </div>

        <h3>Polera Gamer</h3>
        <p>Diseño inspirado en videojuegos.</p>
    </div>

</div>

</body>
</html>
