<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarDesigns WhatsApp</title>

<style>
body{
    margin:0;
    background:#ece5dd;
    font-family:Arial;
}

header{
    background:#25d366;
    color:white;
    padding:15px;
    text-align:center;
}

.chat{
    padding:20px;
}

.mensaje{
    background:white;
    width:250px;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

.usuario{
    background:#dcf8c6;
    margin-left:auto;
}
</style>
</head>

<body>

<header>
    <h1>WhatsApp StarDesigns</h1>
</header>

<div class="chat">

    <div class="mensaje">
        Hola, ¿tienen diseños anime?
    </div>

    <div class="mensaje usuario">
        Sí, tenemos nuevos modelos disponibles 🔥
    </div>

</div>

</body>
</html>
